<script>

const username = "monesh-sys";
const repo = "EduHub";

fetch(`https://api.github.com/repos/${username}/${repo}/contents/pdf`)
.then(response => response.json())
.then(data => {

let container = document.getElementById("pdfList");
container.innerHTML="";

data.forEach(file => {

if(file.name.endsWith(".pdf")){

let button = document.createElement("button");

button.innerText = file.name;

button.onclick = function(){
window.open(file.download_url);
}

container.appendChild(button);

}

});

});

</script>
