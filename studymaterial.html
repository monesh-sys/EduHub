<!DOCTYPE html>
<html>
<head>

<title>Study Materials</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

h1{
background:#1e3a8a;
color:white;
padding:20px;
}

#pdfList{
margin-top:30px;
}

button{
padding:12px 25px;
margin:10px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<h1>Study Materials</h1>

<div id="pdfList">Loading PDFs...</div>

<script>

const username = "moneshsys";
const repo = "EduHub";

fetch(`https://api.github.com/repos/${username}/${repo}/contents/pdf`)
.then(response => response.json())
.then(data => {

let container = document.getElementById("pdfList");
container.innerHTML="";

data.forEach(file => {

if(file.name.endsWith(".pdf")){

let button = document.createElement("button");

button.innerText = file.name;

button.onclick = function(){
window.open(file.download_url);
}

container.appendChild(button);

}

});

});

</script>

<footer style="margin-top:50px;">
<p>© 2026 MoneshSys Technologies. All rights reserved.</p>
</footer>

</body>

</html>
