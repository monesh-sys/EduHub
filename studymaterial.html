<!DOCTYPE html>
<html>
<head>
    <title>Study Material</title>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: linear-gradient(to right, #2f7ecc, #6cc8d6);
            color: white;
        }

        .menu a {
            margin-left: 20px;
            text-decoration: none;
            color: white;
            font-family: Arial;
        }

        .menu a:hover {
            opacity: 0.7;
        }.founder{
          text-align: center;
          margin-top: 100px;
          background: linear-gradient(to right, #2f7ecc, #6cc8d6);
          color: #ffffff;
          padding-bottom: 10px;
          padding-top: 10px;
          font-size: 18px;
        }
        #pdfList button {
    display: block;
    margin: 10px auto;
    padding: 10px 20px;
    background: #4facfe;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

#pdfList button:hover {
    opacity: 0.8;
     box-shadow: 10px 10px 10px rgba(36, 35, 35, 0.282);
}
#pdfList button:active{
  opacity: 0.5;
}
.back-btn {
    display: inline-block;
    padding: 10px 20px;
    background: #ff7b54;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-size: 16px;
}

.back-btn:hover {
    opacity: 0.8;
     box-shadow: 10px 10px 10px rgba(36, 35, 35, 0.282);
}
.back-btn:active{
  opacity: 0.5;
}
    </style>
</head>

<body style= "background: linear-gradient(to right, #1e3c72, #2a5298);">

<header>
    <h2>Study Material</h2>

    <div class="menu">
        <a href="youtube.html">Home</a>
        <a href="studymaterial.html">Study Material</a>
        <a href="mocktest.html">Mock Test</a>
    </div>
</header>
<h2 style="text-align:center; color:white;">📚 Available PDFs</h2>

<div id="pdfList" style="text-align:center;"></div>
<div style="text-align:center; margin-top:30px;">
    <a href="youtube.html" class="back-btn">⬅ Back to Home</a>
</div>
<script>

const username = "monesh-sys";
const repo = "EduHub";
const folder = "studymaterial";

fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`)
.then(response => response.json())
.then(data => {

let container = document.getElementById("pdfList");
container.innerHTML="";

data.forEach(file => {

if(file.name.endsWith(".pdf")){

let button = document.createElement("button");

button.innerText = file.name;

button.onclick = function(){
window.open(file.download_url);
}

container.appendChild(button);

}

});

});

</script>
<div>
  <p class="founder">© 2026 MoneshSys Technologies. All rights reserved.</p>
</div>
</body>
</html>
