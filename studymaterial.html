<!DOCTYPE html>
<html>
<head>

<title>Study Materials</title>

  <link rel="icon" href="logo.png" type="image/png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:linear-gradient(to right, #1e3c72, #2a5298);;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HEADER */

header{
background:#1e3a8a;
color:white;
text-align:center;
padding:20px;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-size:18px;
}

nav a:hover{
text-decoration:underline;
}

/* MAIN SECTION */

section{
flex:1;
text-align:center;
padding:40px 20px;
}

h2{
margin-bottom:20px;
}

/* PDF BUTTONS */

button{
padding:12px 25px;
margin:10px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

/* BACK BUTTON */

.back-btn{
display:inline-block;
margin-bottom:20px;
padding:10px 20px;
background:#16a34a;
color:white;
text-decoration:none;
border-radius:6px;
font-size:16px;
}

.back-btn:hover{
background:#15803d;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
}

/* MOBILE DESIGN */

@media(max-width:600px){

nav a{
display:block;
margin:8px 0;
}

button{
width:85%;
font-size:18px;
}

}

</style>

</head>

<body>

<header>

<h1>Study Materials</h1>

<nav>
<a href="index.html">Home</a>
<a href="studymaterial.html">Study Material</a>
<a href="mocktest.html">Mock Test</a>
</nav>

</header>

<section>

<h2>Available Study Materials</h2>

<div id="pdfList">Loading study materials...</div>

<a href="index.html" class="back-btn">⬅ Back to Home</a>
  
</section>

<footer>
<p>© 2026 MoneshSys Technologies. All rights reserved.</p>
</footer>

<script>

const username = "monesh-sys";
const repo = "EduHub";
const folder = "studymaterial";

fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`)
.then(response => response.json())
.then(data => {

let container = document.getElementById("pdfList");
container.innerHTML="";

data.forEach(file => {

if(file.name.endsWith(".pdf")){

let button = document.createElement("button");

button.innerText = file.name;

button.onclick = function(){
window.open(file.download_url);
}

container.appendChild(button);

}

});

});

</script>

</body>
</html>
