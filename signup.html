<!DOCTYPE html>
<html lang="en">
<head>
  <title>Signup - EduHub</title>
  <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width , initial-scal=1.0">
 <link rel="icon" type="image/png" href="logo.png">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      background-size: 400% 400%;
      animation: gradientBG 8s ease infinite;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .box {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      width: 320px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      color: white;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }

    h2 {
      margin-bottom: 20px;
    }

    .input-box {
      position: relative;
      margin: 15px 0;
    }

    input {
      width: 100%;
      padding: 10px;
      border: none;
      border-bottom: 2px solid white;
      background: transparent;
      color: white;
      outline: none;
      font-size: 16px;
      transition: 0.3s;
    }

    input::placeholder {
      color: rgba(255,255,255,0.7);
    }

    input:focus {
      border-bottom: 2px solid violet;
      transform: scale(1.02);
    }

    .toggle {
      position: absolute;
      right: 10px;
      top: 10px;
      cursor: pointer;
      color: violet;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 20px;
      border: none;
      border-radius: 8px;
      background: blueviolet;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: violet;
    }

    p {
      margin-top: 15px;
      font-size: 14px;
    }

    a {
      color: violet;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Signup</h2>

    <div class="input-box">
      <input type="email" id="email" placeholder="Enter Email">
    </div>

    <div class="input-box">
      <input type="password" id="password" placeholder="Enter Password">
      <span class="toggle" onclick="togglePassword()"></span>
    </div>

    <button id="signupBtn">Sign Up</button>

    <p>Already have account? <a href="login.html">Login</a></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCeacJhCk4Hy00YFgmpD4FcZ_EcMgugWko",
      authDomain: "eduhub-630e3.firebaseapp.com",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const btn = document.getElementById("signupBtn");

    btn.addEventListener("click", () => {
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;

      if (email === "" || password === "") {
        alert("Please fill all fields ❗");
        return;
      }

      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          alert("Signup success 🎉");
          window.location.href = "login.html";
        })
        .catch(err => alert(err.message));
    });

    // 👁️ toggle password
    window.togglePassword = function () {
      let pass = document.getElementById("password");
      pass.type = pass.type === "password" ? "text" : "password";
    }
  </script>

</body>
</html>
