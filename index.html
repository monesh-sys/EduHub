<!DOCTYPE html>

<html>
<head>

<title>MoneshSys Study App</title>
<link rel="icon" href="logo.png" type="image/png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#050505;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* Blur when ad shows */
.blur{
filter:blur(5px);
}

/* HEADER */
header{
background:#1e3a8a;
color:white;
padding:20px;
text-align:center;
}

/* NAVIGATION */
nav{
margin-top:10px;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-size:18px;
}

nav a:hover{
text-decoration:underline;
}

/* MAIN */
section{
flex:1;
text-align:center;
padding:40px 20px;
}

.btn{
display:inline-block;
padding:12px 25px;
margin:10px;
background:#2563eb;
color:white;
border-radius:6px;
font-size:16px;
text-decoration:none;
}

.btn:hover{
background:#1d4ed8;
}

/* FOOTER */
footer{
background:#050505;
color:white;
text-align:center;
padding:15px;
}

/* MOBILE */
@media(max-width:600px){
nav a{
display:block;
margin:8px 0;
font-size:16px;
}

.btn{
width:80%;
font-size:18px;
}
}

/* AD POPUP */
#adPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#adBox{
background:white;
padding:15px;
border-radius:10px;
width:90%;
max-width:500px;
text-align:center;
}

#skipBtn{
margin-top:10px;
padding:10px 20px;
background:red;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
display:none;
}

#timer{
margin-top:8px;
font-size:16px;
color:#333;
}

</style>

</head>

<body>

<div id="mainContent">

<header>

<nav>
<a href="index.html">Home</a>
<a href="studymaterial.html">Study Material</a>
<a href="mocktest.html">Mock Test</a>
</nav>

</header>

<section>

<h2>Welcome Students</h2>

<p>This website provides study materials and mock tests for students.</p>

<br>

<a href="studymaterial.html" class="btn">📚 Study Materials</a> <a href="mocktest.html" class="btn">📝 Mock Test</a>

</section>

<footer>

<p>© 2026 MoneshSys Technologies. All rights reserved.</p>

</footer>

</div>

<!-- AD POPUP -->

<div id="adPopup">

<div id="adBox">

<a href="https://monesh-sys.github.io/MoneshSys-Technologies/" Target="_blank">
<video width="100%" autoplay muted playsinline>
<source src="advideo.mp4" type="video/mp4">
</video>
</a>

<div id="timer">Skip available in 5</div>

<button id="skipBtn" onclick="skipAd()">Skip Ad</button>

</div>

</div>

<script>

let countdown = 5;

/* Show ad after 2 seconds */
setTimeout(function(){

document.getElementById("adPopup").style.display="flex";
document.getElementById("mainContent").classList.add("blur");

startTimer();

},2000);

/* Countdown timer */
function startTimer(){

let timerInterval = setInterval(function(){

countdown--;

document.getElementById("timer").innerText = "Skip available in " + countdown;

if(countdown <= 0){

clearInterval(timerInterval);

document.getElementById("timer").style.display="none";
document.getElementById("skipBtn").style.display="inline-block";

}

},1000);

}

/* Skip ad */
function skipAd(){

document.getElementById("adPopup").style.display="none";
document.getElementById("mainContent").classList.remove("blur");

}

</script>

</body>
</html>
