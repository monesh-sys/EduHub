<!DOCTYPE html>
<html>
<head>

<title>Mock Tests</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#f4f4f4;

display:flex;
flex-direction:column;
min-height:100vh;
}

header{
background:#1e3a8a;
color:white;
text-align:center;
padding:20px;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-size:18px;
}

nav a:hover{
text-decoration:underline;
}

section{
flex:1;
text-align:center;
padding:40px 20px;
}

h2{
margin-bottom:20px;
}

button{
padding:12px 25px;
margin:10px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
}

@media(max-width:600px){

nav a{
display:block;
margin:8px 0;
}

button{
width:80%;
font-size:18px;
}

}

</style>

</head>

<body>

<header>

<h1>Mock Tests</h1>

<nav>
<a href="index.html">Home</a>
<a href="studymaterial.html">Study Material</a>
<a href="mocktest.html">Mock Test</a>
</nav>

</header>

<section>

<h2>Available Mock Tests</h2>

<div id="mockList">Loading mock tests...</div>

</section>

<div>
  <a href="index.html">Back to Home</a>
</div>
  
<footer>
<p>© 2026 MoneshSys Technologies. All rights reserved.</p>
</footer>

<script>

const username = "monesh-sys";
const repo = "EduHub";
const folder = "mocktest";

fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`)
.then(response => response.json())
.then(data => {

let container = document.getElementById("mockList");
container.innerHTML="";

data.forEach(file => {

if(file.name.endsWith(".pdf")){

let button = document.createElement("button");

button.innerText = file.name;

button.onclick = function(){
window.open(file.download_url);
}

container.appendChild(button);

}

});

});

</script>

</body>
</html>
